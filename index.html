<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇮🇸 冰島 14 天露營車環島計畫 | 3/21 - 4/3</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 頂部導航 -->
    <header class="header">
        <div class="header-content">
            <button class="menu-toggle" id="menu-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <div>
                <h1 class="header-title">🇮🇸 冰島環島計畫</h1>
                <div class="header-dates">2026年 3月21日 - 4月3日</div>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-info">
                <span>行程進度：<strong id="progress-text">0/14 天</strong></span>
                <span>完成度：<strong id="progress-percent">0%</strong></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
    </header>

    <!-- 搜尋欄 -->
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="搜尋景點、城市或活動...">
            <button id="clear-search" class="clear-btn" style="display: none;">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- 遮罩層 -->
    <div class="overlay" id="overlay"></div>

    <!-- 主要內容區 -->
    <div class="main-container">
        <!-- 側邊選單（漢堡選單） -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">選單</div>
                <button class="close-menu" id="close-menu">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">📅 每日行程</div>
                <div class="nav-items" id="day-nav">
                    <!-- 由 JavaScript 動態生成 -->
                </div>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">📋 其他資訊</div>
                <div class="nav-items">
                    <button class="nav-item" data-tab="flight">
                        <i class="fas fa-plane"></i>
                        <span>航班資訊</span>
                    </button>
                    <button class="nav-item" data-tab="checklist">
                        <i class="fas fa-check-square"></i>
                        <span>行前準備</span>
                    </button>
                    <button class="nav-item" data-tab="tips">
                        <i class="fas fa-lightbulb"></i>
                        <span>注意事項</span>
                    </button>
                    <button class="nav-item" data-tab="souvenirs">
                        <i class="fas fa-gift"></i>
                        <span>必買伴手禮</span>
                    </button>
                    <button class="nav-item" data-tab="must-eat">
                        <i class="fas fa-utensils"></i>
                        <span>必吃美食</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- 主內容區 -->
        <main class="content">
            <div id="content-area">
                <!-- 內容由 JavaScript 動態載入 -->
            </div>
        </main>
    </div>

    <!-- 快速連結浮動按鈕 -->
    <div class="quick-links">
        <button class="quick-link-btn" title="冰島路況">
            <a href="https://www.road.is/" target="_blank">
                <i class="fas fa-road"></i>
            </a>
        </button>
        <button class="quick-link-btn" title="天氣預報">
            <a href="https://en.vedur.is/" target="_blank">
                <i class="fas fa-cloud-sun"></i>
            </a>
        </button>
        <button class="quick-link-btn" title="極光預測">
            <a href="https://en.vedur.is/weather/forecasts/aurora/" target="_blank">
                <i class="fas fa-moon"></i>
            </a>
        </button>
        <button class="quick-link-btn" title="安全旅遊">
            <a href="https://safetravel.is/" target="_blank">
                <i class="fas fa-shield-alt"></i>
            </a>
        </button>
        <button class="quick-link-btn" title="我的地圖">
            <a href="https://www.google.com/maps/@64.5372212,-23.6285889,6z?entry=ttu&g_ep=EgoyMDI2MDMxMS4wIKXMDSoASAFQAw%3D%3D" target="_blank">
                <i class="fas fa-map-marked-alt"></i>
            </a>
        </button>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
